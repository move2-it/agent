name: Run CI Agent

on:
  push:
    branches:
    - feature/A-[0-9]*/[a-zA-Z0-9]*

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set-up Go
      uses: actions/setup-go@v3
      with:
        go-version: 1.18
        run: go env -w GO111MODULE=on

    - name: Build
      run: go mod init move2.it/agent &&
           go mod tidy &&
           go build -v main.go

    # - name: Unit-Test
    #   run: cd test && go test -v .

    - name: Integration-Test
      run: cd integration_test && go test -v .
